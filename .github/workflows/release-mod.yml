name: Release Mod

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to create/use for this release (e.g. v2.1.0)"
        required: true
        type: string
      release_name:
        description: "Release title (optional)"
        required: false
        type: string
      starmade_build_url:
        description: "Optional direct StarMade build zip URL override"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: gradle

      - name: Prepare StarMade compile dependencies
        id: starmade
        env:
          STARMADE_DEV_BASE_URL: http://files-origin.star-made.org/build/dev/
          STARMADE_BUILD_URL: ${{ github.event.inputs.starmade_build_url }}
          STARMADE_DOWNLOAD_PATTERN: ^starmade-build_[0-9]{8}_[0-9]{6}\.zip$
        run: bash .github/scripts/prepare_starmade.sh

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync version from tag
        env:
          TAG_NAME: ${{ steps.tag.outputs.value }}
        run: |
          tag="$TAG_NAME"
          version="$tag"
          version="${version#v}"

          if [[ -z "$version" ]]; then
            echo "Resolved version is empty from tag '$tag'" >&2
            exit 1
          fi

          sed -i -E "s/^mod_version=.*/mod_version=${version}/" gradle.properties
          sed -i -E "s/(\"version\"\s*:\s*\")[^\"]+(\")/\1${version}\2/" src/main/resources/mod.json

      - name: Build mod jar
        run: |
          chmod +x gradlew
          ./gradlew clean jar -Pstarmade_root="${{ steps.starmade.outputs.starmade_root }}"

      - name: Collect artifacts
        id: collect
        env:
          STARMADE_ROOT: ${{ steps.starmade.outputs.starmade_root }}
        run: |
          mkdir -p dist
          mod_name="$(grep -E '^mod_name=' gradle.properties | head -n 1 | cut -d '=' -f 2- | tr -d '\r')"
          mod_version="$(grep -E '^mod_version=' gradle.properties | head -n 1 | cut -d '=' -f 2- | tr -d '\r')"

          if [[ -z "$mod_name" || -z "$mod_version" ]]; then
            echo "Failed to resolve mod_name/mod_version from gradle.properties" >&2
            exit 1
          fi

          jar_file="${mod_name}v${mod_version}.jar"
          candidates=(
            "${STARMADE_ROOT%/}/mods/${jar_file}"
            "build/libs/${jar_file}"
          )

          jar_path=""
          for candidate in "${candidates[@]}"; do
            if [[ -f "$candidate" ]]; then
              jar_path="$candidate"
              break
            fi
          done

          if [[ -z "$jar_path" ]]; then
            echo "Expected mod jar not found. Checked:" >&2
            printf ' - %s\n' "${candidates[@]}" >&2
            echo "Available jars under StarMade mods:" >&2
            ls -la "${STARMADE_ROOT%/}/mods" || true
            echo "Available jars under build/libs:" >&2
            ls -la build/libs || true
            exit 1
          fi

          cp "$jar_path" dist/
          sha256sum "dist/$(basename "$jar_path")" > "dist/$(basename "$jar_path").sha256"
          echo "artifact_count=$(ls -1 dist | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Resolve release title
        id: title
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_name }}" ]]; then
            echo "value=${{ github.event.inputs.release_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ steps.tag.outputs.value }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag on workflow_dispatch if missing
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG_NAME: ${{ steps.tag.outputs.value }}
        run: |
          if git rev-parse -q --verify "refs/tags/$TAG_NAME" >/dev/null; then
            echo "Tag $TAG_NAME already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.title.outputs.value }}
          body: |
            Automated release build.

            StarMade dependency source:
            - ${{ steps.starmade.outputs.download_url }}

            Build inputs:
            - Java: Temurin 8
            - Gradle task: clean jar
          files: |
            dist/*.jar
            dist/*.sha256
